<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clon de Lógica Camera Tester</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
        .controls { margin: 15px 0; }
        select, button { padding: 10px; font-size: 16px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; cursor: pointer; font-weight: bold; }
        video { width: 100%; max-width: 500px; background: black; border-radius: 8px; margin-top: 10px; display: none; }
        .log {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
            font-family: monospace;
            text-align: left;
        }
        .log-item { padding: 3px 0; border-bottom: 1px solid #dee2e6; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
    </style>
</head>
<body>

<h2>Probador de Cámara Estilo IssueBadge</h2>

<div class="controls">
    <button id="btnStart">Start Camera</button>
    <button id="btnStop">Stop Camera</button>
</div>

<div class="controls">
    <label for="videoSource">Select Camera Device: </label>
    <select id="videoSource">
        <option value="">Cargando cámaras...</option>
    </select>
</div>

<video id="video" autoplay muted playsinline></video>

<div class="log" id="log">
    <div class="log-item">📋 Logs...</div>
</div>

<script>
    const videoElement = document.getElementById('video');
    const videoSelect = document.getElementById('videoSource');
    const btnStart = document.getElementById('btnStart');
    const btnStop = document.getElementById('btnStop');
    const logDiv = document.getElementById('log');
    let currentStream = null;

    function addLog(message, type = 'info') {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'log-item ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : '');
        div.textContent = `${time}: ${message}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
        console.log(message);
    }

    // Escuchar cambios en el selector de cámaras
    videoSelect.onchange = startCamera;

    // 1. Detener cualquier transmisión activa de forma limpia
    function stopCurrentStream() {
        if (currentStream) {
            addLog('🛑 Deteniendo stream actual...');
            currentStream.getTracks().forEach(track => {
                track.stop();
                addLog(`  ↳ Track detenido: ${track.kind}`);
            });
            currentStream = null;
        }
    }

    // 2. Obtener la lista de cámaras disponibles (Crucial para que no parpadee)
    async function getDevices() {
        try {
            addLog('📹 Enumerando dispositivos...');
            const devices = await navigator.mediaDevices.enumerateDevices();
            videoSelect.innerHTML = ''; // Limpiar opciones
            
            let count = 1;
            devices.forEach(device => {
                if (device.kind === 'videoinput') {
                    const option = document.createElement('option');
                    option.value = device.deviceId;
                    option.text = device.label || `Cámara ${count++}`;
                    videoSelect.appendChild(option);
                    addLog(`  ↳ ${option.text} (${device.deviceId.substring(0, 20)}...)`);
                }
            });
            addLog(`✅ ${videoSelect.options.length} cámaras encontradas`, 'success');
        } catch (error) {
            addLog('❌ Error listando dispositivos: ' + error.message, 'error');
            console.error('Error listando dispositivos:', error);
        }
    }

    // 3. Arrancar la cámara seleccionada
    async function startCamera() {
        addLog('🔵 Iniciando cámara...');
        stopCurrentStream(); // Primero apagamos lo que esté encendido
        
        const videoSource = videoSelect.value;
        addLog(`📍 DeviceId seleccionado: ${videoSource || 'GENÉRICO (sin restricciones)'}`);
        
        // Configuramos las restricciones dinámicamente según la selección
        const constraints = {
            video: videoSource ? { deviceId: { exact: videoSource } } : true,
            audio: false
        };

        try {
            addLog('📹 Solicitando getUserMedia...');
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            currentStream = stream;
            videoElement.srcObject = stream;
            videoElement.style.display = "block";
            
            addLog('✅ Stream obtenido!', 'success');
            addLog(`📐 Video: ${videoElement.videoWidth}x${videoElement.videoHeight}`);
            
            // Una vez que da el primer permiso, la lista de etiquetas de cámaras ya está accesible
            if (!videoSource) {
                addLog('🔄 Primera vez - actualizando lista de cámaras...');
                await getDevices();
            }
        } catch (error) {
            addLog('❌ Error: ' + error.message, 'error');
            alert('No se pudo iniciar la cámara seleccionada: ' + error.message);
        }
    }

    // Eventos de los botones
    btnStart.addEventListener('click', startCamera);
    btnStop.addEventListener('click', () => {
        stopCurrentStream();
        videoElement.style.display = "none";
        addLog('✅ Cámara detenida', 'success');
    });

    // Cargar cámaras iniciales de manera genérica al cargar la página si hay permisos implícitos
    addLog('🔍 Verificando permisos previos...');
    navigator.mediaDevices.enumerateDevices().then(devices => {
        const hasLabels = devices.some(d => d.label !== '');
        if (hasLabels) {
            addLog('✅ Permisos ya concedidos - cargando lista', 'success');
            getDevices();
        } else {
            addLog('⚠️ Sin permisos previos - toca Start Camera primero');
            videoSelect.innerHTML = '<option value="">Toca Start Camera primero</option>';
        }
    });
</script>

</body>
</html>
